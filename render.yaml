# render.yaml
# Render Blueprint file — defines all services for this project.
# Render reads this file from your repo root and provisions everything automatically.
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined here:
#   cds-frontend - Static site (frontend HTML at ./frontend/)
#   cds-api      - FastAPI web service (free tier)
#   cds-worker   - Celery worker deployed as a web service (free tier)
#
# WHY cds-worker IS TYPE "web" AND NOT TYPE "worker":
# Render's "background worker" service type is only available on paid plans.
# However, a web service container runs continuously just like a worker would.
# We override the start command to run Celery instead of uvicorn.
# Render gives it a public URL it never receives traffic on, which is fine.
# The container stays running, connects to Redis, and processes jobs normally.
# This is the standard community workaround for running Celery on Render's free tier.
#
# External services (not managed by Render):
#   Postgres   - Supabase (already set up)
#   Storage    - Supabase (already set up)
#   Redis      - Upstash (set up separately, URL goes in Render env vars)
#   AI         - Groq (already set up)

services:

  # ── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: cds-frontend
    runtime: static
    staticPublishPath: ./frontend
    buildCommand: ""
    # NOTE: if you already have this static site configured via the Render dashboard,
    # update its Publish Directory to "frontend" (was "app/frontend" before restructure).

  # ── API Service ───────────────────────────────────────────────────────────
  - type: web
    name: cds-api
    runtime: docker
    # Render builds from your Dockerfile automatically.
    # Uses the CMD in your Dockerfile: uvicorn app.main:app --host 0.0.0.0 --port 8000
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # sync: false means you set this in the Render dashboard
      - key: REDIS_URL
        sync: false        # set to your Upstash Redis URL (starts with rediss://)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://clinical-decision-support-system-1cqq.onrender.com

  # ── Worker Service ────────────────────────────────────────────────────────
  # Deployed as type "web" because Render's free plan does not support type "worker".
  # The dockerCommand override replaces the Dockerfile CMD with the Celery command.
  # This container never serves HTTP traffic — it only connects to Redis and processes jobs.
  - type: web
    name: cds-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    # This overrides the default CMD ["uvicorn", ...] in the Dockerfile.
    # --concurrency=1 matches the free plan's 512MB RAM limit.
    # On the free plan, one concurrent worker is the safe ceiling.
    # start_worker.sh starts worker_health.py in the background (satisfies Render
    # port binding requirement) then runs Celery in the foreground.
    dockerCommand: sh start_worker.sh
    plan: free
    # No healthCheckPath — this service does not serve HTTP.
    # Render will show it as "live" once the container starts and stays running.
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false